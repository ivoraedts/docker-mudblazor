networks:
  docker-mudblazor:
    external: false

services:
  docker-mudblazor:
    build:
      context: .
      dockerfile: MyApplication/Dockerfile
    networks:
      - docker-mudblazor
    volumes:
      - ./docker/mudblazor:/app/data
    ports:
      # <Host Port>:<Container Port>
      - "3080:8080"
    environment:
      # Connection string for the database (overrides appsettings.json)
      ConnectionStrings__MudBlazorDatabase: "Host=postgres:5432; Database=SomeTestDatabase; Username=user-name; Password=strong-password"
      S3__ServiceURL: "http://minio:9000"
      ASPNETCORE_ENVIRONMENT: Production
      # Optional overrides for the About page admin links (defaults already work for localhost)
      AdminLinks__DbAdminUrl: "http://localhost:5050"
      AdminLinks__MinioConsoleUrl: "http://localhost:9001"